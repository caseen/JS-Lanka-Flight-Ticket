
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Lanka Travels - Luxury AI Itinerary Portal</title>
    <meta name="description" content="Premium AI-powered flight itinerary generator for JS Lanka Travels and Tours.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0B3D91;
            --accent-orange: #FF7A00;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            padding: 0;
        }

        .font-poppins {
            font-family: 'Poppins', sans-serif;
        }
        
        /* A4 Page Styling for Digital Preview */
        @media screen {
            .a4-page {
                width: 210mm;
                min-height: 297mm;
                margin: 40px auto;
                background: white;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
                border-radius: 4px;
                position: relative;
                transform-origin: top center;
            }
            
            /* Add a subtle paper texture to the preview */
            .a4-page::before {
                content: "";
                position: absolute;
                top: 0; left: 0; right: 0; bottom: 0;
                background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
                opacity: 0.03;
                pointer-events: none;
                z-index: 50;
            }
        }

        /* Print Optimization */
        @media print {
            @page {
                size: A4;
                margin: 0;
            }
            body {
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .no-print {
                display: none !important;
            }
            .a4-page {
                width: 210mm !important;
                height: 297mm !important;
                margin: 0 !important;
                box-shadow: none !important;
                border: none !important;
                border-radius: 0 !important;
            }
            .flight-card {
                page-break-inside: avoid;
            }
        }

        /* Custom Scrollbar for Luxury Feel */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
<script type="importmap">
{

    "lucide-react": "https://esm.sh/lucide-react@^0.564.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
</body>
</html>
